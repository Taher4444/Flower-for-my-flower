<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وضوح فائق - بحبك يا حبوبتي</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0104; /* خلفية أغمق لزيادة التباين */
        }
        canvas {
            display: block;
            touch-action: none;
        }
    </style>
</head>
<body>

<canvas id="flowerCanvas"></canvas>

<script>
    const canvas = document.getElementById('flowerCanvas');
    const ctx = canvas.getContext('2d');

    let width, height, flowers = [];
    let phase = 0; 

    // --- إعدادات الكثافة والوضوح الفائق ---
    const density = 3; // مسافة صغيرة جداً = عدد أزهار ضخم ووضوح مذهل
    const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ff85a1', '#fbb1bd', '#ffffff'];

    function init() {
        resize();
        animate();
        // صعود هادئ ثم تشكيل الكلمة
        setTimeout(() => { phase = 1; }, 4000);
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        generateFlowers();
    }

    function generateFlowers() {
        const tempCanvas = document.createElement('canvas');
        const tCtx = tempCanvas.getContext('2d');
        tempCanvas.width = width;
        tempCanvas.height = height;

        // استخدام خط Arial Black ليكون عريضاً جداً ومقروءاً
        const fontSize = Math.min(width / 4.5, 110);
        tCtx.font = `900 ${fontSize}px "Arial", sans-serif`;
        tCtx.textAlign = 'center';
        tCtx.textBaseline = 'middle';
        tCtx.fillStyle = 'white';
        tCtx.fillText("بحبك يا حبوبتي", width / 2, height / 2);

        const imageData = tCtx.getImageData(0, 0, width, height).data;
        flowers = [];

        // مسح النقاط بكثافة عالية جداً
        for (let y = 0; y < height; y += density) {
            for (let x = 0; x < width; x += density) {
                const index = (y * width + x) * 4 + 3;
                if (imageData[index] > 150) { // زيادة الحساسية للنقاط
                    flowers.push(new Flower(x, y));
                }
            }
        }
    }

    class Flower {
        constructor(targetX, targetY) {
            this.targetX = targetX;
            this.targetY = targetY;
            this.x = Math.random() * width;
            this.y = height + Math.random() * 600;
            
            // حجم صغير وموحد لزيادة دقة رسم الحروف
            this.size = 2.5; 
            this.color = colors[Math.floor(Math.random() * colors.length)];
            
            this.vx = (Math.random() - 0.5) * 1.5;
            this.vy = -(Math.random() * 1.5 + 0.8);
            this.angle = Math.random() * Math.PI * 2;
        }

        update() {
            if (phase === 0) {
                this.x += this.vx + Math.sin(this.y / 40) * 0.5;
                this.y += this.vy;
                if (this.y < -20) this.y = height + 20;
            } else {
                // جذب مغناطيسي ناعم ودقيق لمكان الحرف
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                this.x += dx * 0.025; // تقليل السرعة قليلاً لزيادة النعومة
                this.y += dy * 0.025;
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // رسم وردة مستديرة رقيقة (6 بتلات)
            ctx.fillStyle = this.color;
            for(let i=0; i<6; i++) {
                ctx.rotate(Math.PI/3);
                ctx.beginPath();
                // البتلات متلاصقة لتعطي شكلاً مستديراً
                ctx.arc(this.size * 0.8, 0, this.size * 0.8, 0, Math.PI*2);
                ctx.fill();
            }
            // قلب الوردة
            ctx.beginPath();
            ctx.fillStyle = '#FFD700';
            ctx.arc(0, 0, this.size * 0.4, 0, Math.PI*2);
            ctx.fill();
            
            ctx.restore();
        }
    }

    function animate() {
        // مسح الشاشة مع خلفية شبه شفافة لتعزيز الانسيابية
        ctx.fillStyle = 'rgba(10, 1, 4, 0.4)';
        ctx.fillRect(0, 0, width, height);

        flowers.forEach(flower => {
            flower.update();
            flower.draw();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    init();
</script>

</body>
</html>
